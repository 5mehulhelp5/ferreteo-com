<!-- company -->
<!-- ko if: addressFields.company.company == 1 -->
<div data-bind="attr: {'class': addressFields.company.is_required == 1?'field required':'field'}">
    <label class="label">
        <span data-bind="i18n: 'Company'"></span>
    </label> 
    <div class="control">
        <input type="text" data-bind="attr: {
            'class':addressFields.company.is_required == 1?addressFields.company.companyValidationClass:'input-text',
            'id':'seller-company',
            'name':'company'
        }">
    </div>
</div>
<!-- /ko -->

<!-- telephone -->
<!-- ko if: addressFields.telephone.telephone == 1 -->
<div data-bind="attr: {'class': addressFields.telephone.is_required == 1?'field required':'field'}">
    <label class="label">
        <span data-bind="i18n: 'Phone Number'"></span>
    </label> 
    <div class="control">
        <input type="text" data-bind="attr: {
            'class':addressFields.telephone.is_required == 1?addressFields.telephone.telephoneValidationClass:'input-text',

            'name':'telephone'
        }">
    </div>
</div>
<!-- /ko -->

<!-- street -->
<div data-bind="attr: {'class': 'field required'}">
    <label class="label">
        <span data-bind="i18n: 'Street Address'"></span>
    </label> 
    <div class="control">
        <input type="text" data-bind="attr: {
            'data-validate':'{required:true}',
            'class':'required-entry',
            'id':'seller-address',
            'name':'street[]'
        }">
        <div class="nested" >
            <!-- ko foreach: streetData -->
                <div class="field additional">
                    <!-- <label class="label">
                        <span data-bind="text: $t('Address')"></span>
                    </label> -->
                    <div class="control">
                        <input type="text" data-bind="attr: {
                            'data-validate':'{required:true}',
                            'class':streetValidationClass,
                            'id':'seller-address_'+streetLines,
                            'name':'street[]'
                        }">
                    </div>
                </div>
            <!-- /ko -->
        </div>
    </div>
</div>

<!-- city -->
<div data-bind="attr: {'class': 'field required'}">
    <label class="label">
        <span data-bind="i18n: 'City'"></span>
    </label> 
    <div class="control">
        <input type="text" data-bind="attr: {
            'data-validate':'{required:true}',
            'class':'required-entry',
            'id':'seller-city',
            'name':'city'
        }">
    </div>
</div>

<!-- state -->
<div data-bind="attr: {'class': 'field required'}">
    <label class="label">
        <span data-bind="i18n: 'State/Province'"></span>
    </label>
    <div class="control">
        <select data-bind="attr: {
            'data-validate':'{required:true}',
            'id':'region_id',
            'name':'region_id'
        }, style: {'display': displaySelect()}">
            <!-- ko foreach: regionData() -->
                <option data-bind="i18n: name, attr: {'value': region_id}"></option>
            <!-- /ko -->
        </select>
        <input type="text" data-bind="attr: {
            'data-validate':'{required:true}',
            'class':'required-entry',
            'id':'region',
            'name':'region'
        },
        style: {'display': displayInput()}
        ">
    </div>
</div>

<!-- postcode -->
<div data-bind="attr: {'class': 'field required'}">
    <label class="label">
        <span data-bind="i18n: 'Zip/Postal Code'"></span>
    </label> 
    <div class="control">
        <input type="text" data-bind="attr: {
            'data-validate':'{required:true}',
            'class':'required-entry',
            'id':'seller-postcode',
            'name':'postcode'
        }">
    </div>
</div>

<!-- country -->
<div data-bind="attr: {'class': 'field required'}">
    <label class="label">
        <span data-bind="i18n: 'Country'"></span>
    </label>
    <div class="control">
        <select data-bind="attr: {'id': 'country',
                'name': 'country_id',
                'data-validate': '{required: true}'
                },
                event :{change: getRegions}
                "
                
                >
            <!-- ko foreach: countryData -->
                <option data-bind="i18n: label, attr: {'value': value}"></option>
            <!-- /ko -->
            </select>
    </div>
</div>
<input type="hidden" name="default_billing" value="1">
<input type="hidden" name="default_shipping" value="1">
<input type="hidden" name="create_address" value="1" />
